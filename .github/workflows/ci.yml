name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Markdown Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          npm install -g markdownlint-cli

      - name: Set up problem matcher
        uses: xt0rted/markdownlint-problem-matcher@v3

      - name: Run markdown linter
        run: |
          markdownlint **/*.md --ignore node_modules --config .github/markdownlint.yml

  spelling:
    name: Portuguese Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python programs
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pyspelling

      - name: Install aspell Portuguese dictionary
        run: |
          sudo apt-get update
          sudo apt-get install -y aspell aspell-pt-br

      - name: Run spell check
        run: |
          pyspelling --config .github/pyspelling.yml

  link-check:
    name: Link Validation
    runs-on: ubuntu-latest
    # Links externos oscilam (rede, rate limits); o job informa sem
    # bloquear merges. Links internos falham o build via onBrokenLinks.
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install markdown-link-check
        run: |
          npm install -g markdown-link-check

      - name: Check links in markdown files
        run: |
          find . -name "*.md" -not -path "./node_modules/*" -exec markdown-link-check --quiet --config .github/markdown-link-check.json {} \;

  playgrounds:
    name: Playground Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (TypeScript 7)
        run: npm run typecheck

      - name: Run playground tests and docs audit
        run: npm test

  e2e:
    name: E2E (experiência do leitor)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  summary:
    name: Quality Check Summary
    runs-on: ubuntu-latest
    needs: [lint, spelling, playgrounds, e2e]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Spelling: ${{ needs.spelling.result }}"
          echo "Playgrounds: ${{ needs.playgrounds.result }}"
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.spelling.result }}" != "success" ] || [ "${{ needs.playgrounds.result }}" != "success" ]; then
            echo "❌ Some quality checks failed"
            exit 1
          fi
          echo "✅ All quality checks passed!"
